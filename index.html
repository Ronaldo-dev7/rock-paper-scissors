<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="app.css" />
    <title>Rock-Paper-Scissors</title>
  </head>
  <body>
    <h1 class="h1-element">Rock-Paper-Scissors</h1>
    <div class="button">
      <!-- Rock -->
      <button class="move-button" onclick="playGame('rock')">Rock</button>
      <!-- Paper -->
      <button class="move-button" onclick="playGame('paper')">Paper</button>
      <!-- Scissors -->
      <button class="move-button" onclick="playGame('scissors')">
        Scissors
      </button>
    </div>
    <p class="js-result"></p>
    <p class="js-move"></p>
    <p class="js-score"></p>
    <!-- Reset -->
    <button
      class="btn"
      onclick="
        score.wins = 0;
        score.losses = 0;
        score.ties = 0;
        localStorage.removeItem('score');
      "
    >
      Rest Score
    </button>

    <script>
      let score = JSON.parse(localStorage.getItem("score")) || {
        wins: 0,
        losses: 0,
        ties: 0,
      };
      updateScoreElement();

      if (!score) {
        score = {
          wins: 0,
          losses: 0,
          ties: 0,
        };
      }

      function playGame(playerMove) {
        const computerMove = pickComputerMove();
        let result = "";

        if (playerMove === "scissors") {
          if (computerMove === "rock") {
            result = "You Lose.";
          } else if (computerMove === "paper") {
            result = "You Win.";
          } else {
            result = "Tie.";
          }
        } else if (playerMove === "paper") {
          if (computerMove === "rock") {
            result = "You Win.";
          } else if (computerMove === "paper") {
            result = "Tie.";
          } else {
            result = "You Lose.";
          }
        } else if (playerMove === "rock") {
          if (computerMove === "rock") {
            result = "Tie.";
          } else if (computerMove === "paper") {
            result = "You Lose.";
          } else {
            result = "You Win.";
          }
        }

        if (result === "You Win.") {
          score.wins++;
        } else if (result === "You Lose.") {
          score.losses++;
        } else if (result === "Tie.") {
          score.ties++;
        }
        localStorage.setItem("score", JSON.stringify(score));

        updateScoreElement();
        document.querySelector(".js-result").innerHTML = result;

        document.querySelector(".js-move").innerHTML =
          `You ${playerMove} - ${computerMove} Computer`;
      }

      function updateScoreElement() {
        document.querySelector(".js-score").innerHTML =
          `Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`;
      }

      function pickComputerMove() {
        const randomNumber = Math.random();

        if (randomNumber < 1 / 3) {
          return "rock";
        } else if (randomNumber < 2 / 3) {
          return "paper";
        } else {
          return "scissors";
        }
      }
    </script>
  </body>
</html>
